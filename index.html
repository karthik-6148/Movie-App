<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="karthikeya">
    <meta name="description" content="Top 250 movies with search ,rating and genere filter">
    <link rel="stylesheet" href="style.css">
    <title>Movie App</title>
    
</head>
<body>
    <header class="header">
        <h1 class="heading-1">
            Movie app
        </h1>
    </header>
    <main class="main">
        <div class="card shadow">
            <div class="card-image-container">
               <img src="https://m.media-amazon.com/images/I/81OTZtqXIIL.jpg" class="card-image" alt="GodFather">
            </div>
            <div class="movie-details">
                <p class="title">The GodFather</p>
                <p class="genre">Genre: Action , Drama</p>
                <div class="ratings">
                    <div class="star-rating">
                   
                    <span class="material-icons-outlined">star</span>
                    <span>8.7</span>
                    </div>
                    <p>137</p>
                </div>
                
            </div>
        </div>
    </main>
</body>
</html>
